---
apt_packages:
  # Personal Development Tools - Unique packages not in desktop-standard foundation.
  - {name: "apt-transport-https"} # Ensures HTTPS APT transport is available.
  - {name: "libnss3-tools"} # For managing NSS databases (certutil).
  - {name: "python3-psutil", state: "latest"} # Required by community.general.dconf (uses system Python).
  - {name: "default-jdk"} # Java Development Kit for Java programming.

# Use the interactive user's pipx launcher so the module does not fall back to
# Ansible's own pipx-managed Python, which does not include the pipx package.
pipx_executable: "{{ lookup('env', 'HOME') }}/.local/bin/pipx"

pipx_packages:
  # Personal Development Environment - Ansible tools for infrastructure management.
  - {name: "ansible", install_deps: true}
  - {name: "ansible-lint", install_deps: true}
  - {name: "ansible", state: "inject", include_injected: true, inject_packages: ['jmespath', 'hvac', 'certifi', 'passlib']}

# This file lists all Ansible Galaxy collections required by this project.
ansible_galaxy_collections:
  - {name: "community.general"} # General purpose Ansible roles and collections.
  - {name: "community.hashi_vault"} # HashiCorp Vault.
  - {name: "community.crypto"} # Cryptography and HashiCorp Vault.
  - {name: "fortinet.fortios"} # To work with Fortigate.
