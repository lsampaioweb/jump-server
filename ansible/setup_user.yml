---
- name: "Preparing the virtual machine with my user's settings"
  hosts: "{{ inventory_hosts | default('target') }}"
  gather_facts: false
  become: true

  vars_prompt:
    - name: "ansible_user"
      prompt: "Enter the user name"
      private: false

    - name: "ansible_password"
      prompt: "Enter the user password"
      private: true

    - name: "git_user_name"
      prompt: "Enter your Git user name"
      private: false

    - name: "git_user_email"
      prompt: "Enter your Git user email"
      private: false

  pre_tasks:
    - name: "Getting facts using the setup module"
      ansible.builtin.setup:

  roles:
    - "setup_user"
